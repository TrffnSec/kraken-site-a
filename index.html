<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Trusted Site A</title>
</head>
<body>
  <h1>Trusted Site A</h1>
  <p>This is the trusted connected origin.</p>

  <button id="connect">Connect Wallet</button>
  <button id="accounts">Check Accounts</button>

  <pre id="log"></pre>

  <script>
    function log(...x) {
      const line = x.map(v => {
        try {
          if (typeof v === "object") return JSON.stringify(v);
          return String(v);
        } catch (_) {
          return String(v);
        }
      }).join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    async function waitEthereum() {
      while (!window.ethereum) {
        await new Promise(r => setTimeout(r, 25));
      }
      return window.ethereum;
    }

    async function connect() {
      const provider = await waitEthereum();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      log("[A] eth_requestAccounts:", accounts);
      log("[A] eth_chainId:", await provider.request({ method: "eth_chainId" }));
    }

    async function accounts() {
      const provider = await waitEthereum();
      const result = await provider.request({ method: "eth_accounts" });
      log("[A] eth_accounts:", result);
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("accounts").onclick = accounts;

    log("[A] loaded:", location.href);
  </script>
</body>
</html>
