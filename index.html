<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kraken Solana Batch Signing Debug Test</title>
  <script src="https://unpkg.com/@solana/web3.js@1.95.4/lib/index.iife.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; line-height: 1.45; }
    button, input { display: block; margin: 10px 0; padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; }
    pre { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Kraken Solana Batch Signing Debug Test</h1>

  <p>
    This page tests Kraken Wallet Solana signTransaction and signAllTransactions.
    It creates memo-only transactions and does not broadcast them.
  </p>

  <button id="connect">1. Connect Solana Wallet</button>

  <label for="blockhash"><b>Latest Solana blockhash from Kali:</b></label>
  <input id="blockhash" placeholder="Paste latest Solana blockhash here">

  <button id="signOne">2A. Sign ONE memo transaction</button>
  <button id="signTwo">2B. Sign TWO memo transactions</button>

  <pre id="log"></pre>

  <script>
    let publicKey = null;

    function log(...x) {
      const line = x.map(v => {
        try {
          if (typeof v === "object") return JSON.stringify(v);
          return String(v);
        } catch (_) {
          return String(v);
        }
      }).join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    window.onerror = function(message, source, lineno, colno, error) {
      log("WINDOW_ERROR:", message, "line=" + lineno, "col=" + colno, error && error.stack ? error.stack : "");
    };

    window.onunhandledrejection = function(event) {
      log("UNHANDLED_REJECTION:", event.reason && event.reason.stack ? event.reason.stack : String(event.reason));
    };

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function asciiBytes(str) {
      const out = new Uint8Array(str.length);
      for (let i = 0; i < str.length; i++) {
        out[i] = str.charCodeAt(i) & 0xff;
      }
      return out;
    }

    async function getProvider() {
      while (!window.solana) {
        await sleep(25);
      }
      return window.solana;
    }

    async function connect() {
      try {
        const provider = await getProvider();

        log("window.solana detected");
        log("isKrakenWallet:", String(provider.isKrakenWallet));
        log("isPhantom:", String(provider.isPhantom));
        log("typeof signTransaction:", typeof provider.signTransaction);
        log("typeof signAllTransactions:", typeof provider.signAllTransactions);
        log("typeof signAndSendTransaction:", typeof provider.signAndSendTransaction);
        log("typeof signAndSendAllTransactions:", typeof provider.signAndSendAllTransactions);

        const result = await provider.connect();
        publicKey = result.publicKey;

        log("Connected Solana publicKey:", publicKey.toString());
      } catch (e) {
        log("connect error:", e.message || String(e));
        if (e.stack) log(e.stack);
      }
    }

    function getBlockhashOrThrow() {
      const blockhash = document.getElementById("blockhash").value.trim();

      if (!blockhash) {
        throw new Error("Paste a fresh latest Solana blockhash first.");
      }

      return blockhash;
    }

    function makeMemoTx(label, blockhash, user) {
      const {
        PublicKey,
        Transaction,
        TransactionInstruction
      } = window.solanaWeb3;

      const memoProgram = new PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr");

      log("makeMemoTx start:", label);

      const tx = new Transaction({
        feePayer: user,
        recentBlockhash: blockhash
      });

      log("Transaction object created:", label);

      tx.add(
        new TransactionInstruction({
          keys: [],
          programId: memoProgram,
          data: asciiBytes(label)
        })
      );

      log("Memo instruction added:", label);

      return tx;
    }

    async function ensureConnected() {
      if (!publicKey) {
        await connect();
      }

      if (!publicKey) {
        throw new Error("Wallet not connected.");
      }
    }

    async function signOneTransaction() {
      try {
        log("=== SIGN ONE START ===");

        if (!window.solanaWeb3) {
          log("ERROR: solanaWeb3 library did not load from CDN.");
          return;
        }

        const provider = await getProvider();
        log("typeof provider.signTransaction:", typeof provider.signTransaction);

        if (typeof provider.signTransaction !== "function") {
          log("ERROR: provider.signTransaction is not available.");
          return;
        }

        await ensureConnected();

        const { PublicKey } = window.solanaWeb3;
        const user = new PublicKey(publicKey.toString());
        const blockhash = getBlockhashOrThrow();

        log("Using manual recentBlockhash:", blockhash);

        const tx1 = makeMemoTx("TX1_ONLY_MEMO_VISIBLE", blockhash, user);

        log("Calling provider.signTransaction(tx1)");

        const signed = await provider.signTransaction(tx1);

        log("SIGNED_ONE_OK");
        log("SIGNED_ONE_SIGNATURES:", JSON.stringify(signed.signatures.map(s => ({
          publicKey: s.publicKey.toString(),
          hasSignature: s.signature !== null
        }))));

        log("=== SIGN ONE END ===");
      } catch (e) {
        log("signOneTransaction error:", e.message || String(e));
        if (e.stack) log(e.stack);
      }
    }

    async function signTwoTransactions() {
      try {
        log("=== SIGN TWO START ===");

        if (!window.solanaWeb3) {
          log("ERROR: solanaWeb3 library did not load from CDN.");
          return;
        }

        const provider = await getProvider();
        log("typeof provider.signAllTransactions:", typeof provider.signAllTransactions);

        if (typeof provider.signAllTransactions !== "function") {
          log("ERROR: provider.signAllTransactions is not available.");
          return;
        }

        await ensureConnected();

        const { PublicKey } = window.solanaWeb3;
        const user = new PublicKey(publicKey.toString());
        const blockhash = getBlockhashOrThrow();

        log("Using manual recentBlockhash:", blockhash);

        const tx1 = makeMemoTx("TX1_BENIGN_MEMO_SHOULD_BE_VISIBLE", blockhash, user);
        const tx2 = makeMemoTx("TX2_SECOND_MEMO_SHOULD_ALSO_BE_VISIBLE", blockhash, user);

        log("Calling provider.signAllTransactions([tx1, tx2])");
        log("IMPORTANT: inspect Kraken Wallet UI before approving.");

        const signed = await provider.signAllTransactions([tx1, tx2]);

        log("SIGNED_RESULT_COUNT:", signed.length);

        signed.forEach((tx, i) => {
          log("SIGNED_TX_" + (i + 1) + "_SIGNATURES:", JSON.stringify(tx.signatures.map(s => ({
            publicKey: s.publicKey.toString(),
            hasSignature: s.signature !== null
          }))));
        });

        log("DONE. This page did NOT broadcast the signed transactions.");
        log("=== SIGN TWO END ===");
      } catch (e) {
        log("signTwoTransactions error:", e.message || String(e));
        if (e.stack) log(e.stack);
      }
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("signOne").onclick = signOneTransaction;
    document.getElementById("signTwo").onclick = signTwoTransactions;
  </script>
</body>
</html>
