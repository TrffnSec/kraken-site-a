<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TX FROM MISMATCH ONLY</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; line-height: 1.45; }
    button { display: block; margin: 10px 0; padding: 12px; font-size: 16px; width: 100%; }
    pre { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>TX FROM MISMATCH ONLY</h1>

  <button id="connect">1. Connect</button>
  <button id="signTxMismatch">2. eth_signTransaction with WRONG tx.from</button>

  <pre id="log"></pre>

  <script>
    let account = null;
    const WRONG_FROM = "0x1111111111111111111111111111111111111111";

    function log(...x) {
      const line = x.map(v => {
        try {
          if (typeof v === "object") return JSON.stringify(v, null, 2);
          return String(v);
        } catch (_) {
          return String(v);
        }
      }).join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    async function waitEthereum() {
      while (!window.ethereum) {
        await new Promise(r => setTimeout(r, 25));
      }
      return window.ethereum;
    }

    async function connect() {
      const provider = await waitEthereum();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      account = accounts[0];

      log("PAGE:", "TX FROM MISMATCH ONLY");
      log("Connected account:", account);
      log("Wrong tx.from used in test:", WRONG_FROM);
      log("Current chain:", await provider.request({ method: "eth_chainId" }));
    }

    function decodeRawTx(raw) {
      const tx = ethers.Transaction.from(raw);

      return {
        type: tx.type,
        chainId: tx.chainId ? tx.chainId.toString() : null,
        from: tx.from || null,
        to: tx.to || null,
        nonce: tx.nonce,
        gasLimit: tx.gasLimit ? tx.gasLimit.toString() : null,
        value: tx.value ? tx.value.toString() : null,
        data: tx.data,
        gasPrice: tx.gasPrice ? tx.gasPrice.toString() : null,
        maxFeePerGas: tx.maxFeePerGas ? tx.maxFeePerGas.toString() : null,
        maxPriorityFeePerGas: tx.maxPriorityFeePerGas ? tx.maxPriorityFeePerGas.toString() : null,
        signature: tx.signature ? {
          r: tx.signature.r,
          s: tx.signature.s,
          yParity: tx.signature.yParity
        } : null
      };
    }

    async function testTxFromMismatch() {
      const provider = await waitEthereum();

      if (!account) {
        await connect();
      }

      const chainIdHex = await provider.request({ method: "eth_chainId" });
      const chainId = parseInt(chainIdHex, 16);

      const tx = {
        from: WRONG_FROM,
        to: account,
        value: "0x0",
        data: "0x",
        chainId: chainIdHex,
        gas: "0x5208",
        maxPriorityFeePerGas: "0xb7002",
        maxFeePerGas: "0x71e0a6"
      };

      log("=== ETH_SIGNTRANSACTION TX.FROM MISMATCH TEST ===");
      log("Connected account:", account);
      log("DApp-supplied tx.from:", WRONG_FROM);
      log("DApp-supplied tx.to:", account);
      log("DApp-supplied chainId:", chainIdHex, "/", chainId);
      log("Transaction object sent to wallet:", tx);
      log("EXPECTED_SECURE_BEHAVIOR: reject because tx.from != connected account.");
      log("If approval opens, screenshot UI before confirming.");

      try {
        const raw = await provider.request({
          method: "eth_signTransaction",
          params: [tx]
        });

        log("RAW_SIGNED_TX_RETURNED:");
        log(raw);

        const decoded = decodeRawTx(raw);

        log("DECODED_SIGNED_TX:");
        log(decoded);

        log("REQUESTED_TX_FROM:", WRONG_FROM);
        log("CONNECTED_ACCOUNT:", account);
        log("RECOVERED_SIGNED_TX_FROM:", decoded.from);

        if (
          decoded.from &&
          decoded.from.toLowerCase() === account.toLowerCase() &&
          WRONG_FROM.toLowerCase() !== account.toLowerCase()
        ) {
          log("CANDIDATE: Kraken ignored mismatched tx.from and signed transaction with connected account.");
        } else {
          log("NO_CANDIDATE_OR_NEEDS_REVIEW");
        }
      } catch (e) {
        log("eth_signTransaction error:", e.message || String(e));
        if (e.code !== undefined) log("error.code:", e.code);
        if (e.data !== undefined) log("error.data:", e.data);
      }
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("signTxMismatch").onclick = testTxFromMismatch;
  </script>
</body>
</html>
