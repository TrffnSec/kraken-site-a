<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kraken Solana Batch Signing UI Test</title>
  <script src="https://unpkg.com/@solana/web3.js@1.95.4/lib/index.iife.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; line-height: 1.45; }
    button, input { display: block; margin: 10px 0; padding: 12px; font-size: 16px; width: 100%; box-sizing: border-box; }
    pre { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Kraken Solana Batch Signing UI Test</h1>

  <p>
    This page requests two Solana transactions in one signAllTransactions call.
    It does not broadcast them.
  </p>

  <button id="connect">1. Connect Solana Wallet</button>

  <label for="blockhash"><b>Latest Solana blockhash from Kali:</b></label>
  <input id="blockhash" placeholder="Paste latest Solana blockhash here">

  <button id="signTwo">2. Sign TWO transactions only</button>

  <pre id="log"></pre>

  <script>
    let publicKey = null;

    function log(...x) {
      const line = x.join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function getProvider() {
      while (!window.solana) {
        await sleep(25);
      }
      return window.solana;
    }

    async function connect() {
      const provider = await getProvider();

      log("window.solana detected");
      log("isKrakenWallet:", String(provider.isKrakenWallet));
      log("isPhantom:", String(provider.isPhantom));
      log("typeof signTransaction:", typeof provider.signTransaction);
      log("typeof signAllTransactions:", typeof provider.signAllTransactions);
      log("typeof signAndSendTransaction:", typeof provider.signAndSendTransaction);
      log("typeof signAndSendAllTransactions:", typeof provider.signAndSendAllTransactions);

      const result = await provider.connect();
      publicKey = result.publicKey;

      log("Connected Solana publicKey:", publicKey.toString());
    }

    async function signTwoTransactions() {
      if (!window.solanaWeb3) {
        log("ERROR: solanaWeb3 library did not load from CDN.");
        return;
      }

      const provider = await getProvider();

      log("typeof provider.signAllTransactions:", typeof provider.signAllTransactions);

      if (typeof provider.signAllTransactions !== "function") {
        log("ERROR: provider.signAllTransactions is not available.");
        return;
      }

      if (!publicKey) {
        await connect();
      }

      const blockhash = document.getElementById("blockhash").value.trim();

      if (!blockhash) {
        log("ERROR: Paste a fresh latest Solana blockhash first.");
        return;
      }

      const {
        PublicKey,
        SystemProgram,
        Transaction,
        TransactionInstruction,
        Keypair
      } = window.solanaWeb3;

      const user = new PublicKey(publicKey.toString());
      const randomRecipient = Keypair.generate().publicKey;
      const memoProgram = new PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr");

      log("Using manual recentBlockhash:", blockhash);
      log("TX1: 0 lamport self-transfer");
      log("TX2: 0 lamport transfer to random recipient + memo");
      log("TX2 random recipient:", randomRecipient.toString());

      const tx1 = new Transaction({
        feePayer: user,
        recentBlockhash: blockhash
      });

      tx1.add(
        SystemProgram.transfer({
          fromPubkey: user,
          toPubkey: user,
          lamports: 0
        })
      );

      const tx2 = new Transaction({
        feePayer: user,
        recentBlockhash: blockhash
      });

      tx2.add(
        SystemProgram.transfer({
          fromPubkey: user,
          toPubkey: randomRecipient,
          lamports: 0
        })
      );

      tx2.add(
        new TransactionInstruction({
          keys: [],
          programId: memoProgram,
          data: new TextEncoder().encode("TX2_DIFFERENT_RECIPIENT_SHOULD_BE_VISIBLE")
        })
      );

      log("Calling provider.signAllTransactions([tx1, tx2])");
      log("IMPORTANT: inspect the Kraken Wallet UI before approving.");

      try {
        const signed = await provider.signAllTransactions([tx1, tx2]);

        log("SIGNED_RESULT_COUNT:", signed.length);

        signed.forEach((tx, i) => {
          const raw = tx.serialize({
            requireAllSignatures: false,
            verifySignatures: false
          });

          log("SIGNED_TX_" + (i + 1) + "_RAW_LENGTH:", raw.length);
          log("SIGNED_TX_" + (i + 1) + "_SIGNATURES:", JSON.stringify(tx.signatures.map(s => ({
            publicKey: s.publicKey.toString(),
            hasSignature: s.signature !== null
          }))));
        });

        log("DONE. This page did NOT broadcast the signed transactions.");
      } catch (e) {
        log("signAllTransactions error:", e.message || String(e));
      }
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("signTwo").onclick = signTwoTransactions;
  </script>
</body>
</html>
