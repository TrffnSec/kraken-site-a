<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Delayed Chain Switch Sign Test</title>
</head>
<body>
  <h1>Delayed Chain Switch Sign Test</h1>
  <p>This tests whether signing immediately after wallet_switchEthereumChain causes chain-state inconsistency.</p>

  <button id="connect">Connect</button>

  <hr>

  <button id="delay0">Switch Base + sign tx.chainId 0x1 after 0ms</button>
  <button id="delay500">Switch Base + sign tx.chainId 0x1 after 500ms</button>
  <button id="delay2000">Switch Base + sign tx.chainId 0x1 after 2000ms</button>
  <button id="delay5000">Switch Base + sign tx.chainId 0x1 after 5000ms</button>

  <hr>

  <button id="noChain0">Switch Base + sign tx WITHOUT chainId after 0ms</button>
  <button id="noChain2000">Switch Base + sign tx WITHOUT chainId after 2000ms</button>

  <pre id="log"></pre>

  <script>
    let selectedAccount = null;

    function log(...x) {
      const line = x.join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    async function eth() {
      while (!window.ethereum) {
        await sleep(25);
      }
      return window.ethereum;
    }

    async function getChain() {
      const provider = await eth();
      return provider.request({ method: "eth_chainId" });
    }

    async function connect() {
      const provider = await eth();
      const accounts = await provider.request({ method: "eth_requestAccounts" });
      selectedAccount = accounts[0];
      log("Connected:", selectedAccount);
      log("Current chain:", await getChain());
    }

    async function switchToBase() {
      const provider = await eth();

      log("Before switch:", await getChain());

      const result = await provider.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x2105" }]
      });

      log("wallet_switchEthereumChain result:", JSON.stringify(result));
      log("After switch eth_chainId:", await getChain());
    }

    async function signAfterDelay(delayMs, includeChainId) {
      const provider = await eth();

      if (!selectedAccount) {
        await connect();
      }

      await switchToBase();

      log("Waiting before sign:", delayMs, "ms");
      await sleep(delayMs);

      const chainBeforeSign = await getChain();
      log("eth_chainId immediately before sign:", chainBeforeSign);

      const tx = {
        from: selectedAccount,
        to: selectedAccount,
        value: "0x0",
        gas: "0x5208"
      };

      if (includeChainId) {
        tx.chainId = "0x1";
      }

      log("Calling eth_signTransaction. includeChainId:", includeChainId, "tx.chainId:", tx.chainId || "none");

      try {
        const signed = await provider.request({
          method: "eth_signTransaction",
          params: [tx]
        });

        log("SIGNED_RAW_TX_START delay=" + delayMs + " includeChainId=" + includeChainId);
        log(signed);
        log("SIGNED_RAW_TX_END");
      } catch (e) {
        log("eth_signTransaction error:", e.message || String(e));
      }
    }

    document.getElementById("connect").onclick = connect;

    document.getElementById("delay0").onclick = () => signAfterDelay(0, true);
    document.getElementById("delay500").onclick = () => signAfterDelay(500, true);
    document.getElementById("delay2000").onclick = () => signAfterDelay(2000, true);
    document.getElementById("delay5000").onclick = () => signAfterDelay(5000, true);

    document.getElementById("noChain0").onclick = () => signAfterDelay(0, false);
    document.getElementById("noChain2000").onclick = () => signAfterDelay(2000, false);
  </script>
</body>
</html>
