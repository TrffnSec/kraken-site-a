<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chain Switch Test B</title>
</head>
<body>
  <h1>Chain Switch Test B</h1>
  <p>This page tests pre-permission chain switching and approval UI accuracy.</p>

  <button id="runBase">Run Base Chain Test</button>
  <button id="runArbitrum">Run Arbitrum Chain Test</button>
  <button id="txTest">Open 0-value Transaction Prompt</button>

  <pre id="log"></pre>

  <script>
    let selectedAccount = null;

    function log(...x) {
      const line = x.join(" ");
      document.getElementById("log").textContent += line + "\n";
      console.log(line);
    }

    async function waitEthereum() {
      while (!window.ethereum) {
        await new Promise(r => setTimeout(r, 25));
      }
      return window.ethereum;
    }

    async function runChainTest(chainHex, chainName) {
      const eth = await waitEthereum();

      log("=== Testing", chainName, chainHex, "===");

      try {
        const before = await eth.request({ method: "eth_chainId" });
        log("Before switch eth_chainId:", JSON.stringify(before));
      } catch (e) {
        log("Before chainId error:", e.message || String(e));
      }

      try {
        const switchResult = await eth.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: chainHex }]
        });
        log("wallet_switchEthereumChain result:", JSON.stringify(switchResult));
      } catch (e) {
        log("wallet_switchEthereumChain error:", e.message || String(e));
      }

      try {
        const after = await eth.request({ method: "eth_chainId" });
        log("After switch eth_chainId:", JSON.stringify(after));
      } catch (e) {
        log("After chainId error:", e.message || String(e));
      }

      try {
        const accounts = await eth.request({ method: "eth_requestAccounts" });
        selectedAccount = accounts && accounts[0];
        log("eth_requestAccounts result:", JSON.stringify(accounts));
      } catch (e) {
        log("eth_requestAccounts error:", e.message || String(e));
      }

      if (!selectedAccount) {
        log("No selected account; stopping before sign test.");
        return;
      }

      try {
        const sig = await eth.request({
          method: "personal_sign",
          params: [
            "0x48656c6c6f2066726f6d20436861696e205377697463682054657374",
            selectedAccount
          ]
        });
        log("personal_sign result:", JSON.stringify(sig));
      } catch (e) {
        log("personal_sign error:", e.message || String(e));
      }
    }

    document.getElementById("runBase").onclick = () => {
      runChainTest("0x2105", "Base");
    };

    document.getElementById("runArbitrum").onclick = () => {
      runChainTest("0xa4b1", "Arbitrum");
    };

    document.getElementById("txTest").onclick = async () => {
      const eth = await waitEthereum();

      if (!selectedAccount) {
        try {
          const accounts = await eth.request({ method: "eth_requestAccounts" });
          selectedAccount = accounts && accounts[0];
          log("Connected account:", selectedAccount);
        } catch (e) {
          log("Connect error:", e.message || String(e));
          return;
        }
      }

      try {
        const chain = await eth.request({ method: "eth_chainId" });
        log("Current chain before tx prompt:", JSON.stringify(chain));
      } catch (e) {
        log("chainId error:", e.message || String(e));
      }

      try {
        const txHash = await eth.request({
          method: "eth_sendTransaction",
          params: [{
            from: selectedAccount,
            to: selectedAccount,
            value: "0x0"
          }]
        });

        log("eth_sendTransaction result:", JSON.stringify(txHash));
      } catch (e) {
        log("eth_sendTransaction error:", e.message || String(e));
      }
    };
  </script>
</body>
</html>
